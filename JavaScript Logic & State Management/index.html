<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — To-Do List</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app-wrapper">
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">
          <span class="brand-icon">✦</span>
          <h1 class="brand-name">TaskFlow</h1>
        </div>
        <p class="brand-tagline">Your tasks. Your rules.</p>
      </div>
    </header>

    <main class="app-main">
      <!-- Add Task -->
      <section class="add-section">
        <div class="input-row">
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="What needs to be done?"
            maxlength="200"
            autocomplete="off"
          />
          <button id="addBtn" class="btn btn-add" aria-label="Add task">
            <span class="btn-icon">+</span>
            <span class="btn-label">Add</span>
          </button>
        </div>
        <div id="inputError" class="input-error" role="alert" aria-live="polite"></div>
      </section>

      <!-- Stats Bar -->
      <section class="stats-bar" id="statsBar">
        <div class="stat-item">
          <span class="stat-num" id="statTotal">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="statActive">0</span>
          <span class="stat-label">Active</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="statDone">0</span>
          <span class="stat-label">Done</span>
        </div>
      </section>

      <!-- Filter Tabs -->
      <section class="filter-section">
        <div class="filter-tabs" role="tablist" aria-label="Filter tasks">
          <button class="filter-tab active" data-filter="all" role="tab" aria-selected="true">All</button>
          <button class="filter-tab" data-filter="active" role="tab" aria-selected="false">Active</button>
          <button class="filter-tab" data-filter="completed" role="tab" aria-selected="false">Completed</button>
        </div>
        <button id="clearCompletedBtn" class="btn btn-ghost" title="Remove all completed tasks">
          Clear done
        </button>
      </section>

      <!-- Task List -->
      <section class="list-section">
        <ul id="taskList" class="task-list" aria-label="Task list"></ul>
        <div id="emptyState" class="empty-state" hidden>
          <span class="empty-icon">◎</span>
          <p class="empty-title">Nothing here yet</p>
          <p class="empty-sub">Add a task above to get started.</p>
        </div>
      </section>

      <!-- Bulk Actions -->
      <section class="bulk-section" id="bulkSection">
        <button id="markAllBtn" class="btn btn-ghost btn-full">
          <span id="markAllLabel">Mark all complete</span>
        </button>
      </section>
    </main>

    <footer class="app-footer">
      <p>Data saved to <code>localStorage</code> · Built with vanilla JS</p>
    </footer>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal">
      <h2 class="modal-title" id="modalTitle">Edit Task</h2>
      <input type="text" id="editInput" class="task-input" maxlength="200" />
      <div id="editError" class="input-error" role="alert" aria-live="polite"></div>
      <div class="modal-actions">
        <button id="editCancelBtn" class="btn btn-ghost">Cancel</button>
        <button id="editSaveBtn" class="btn btn-add">Save changes</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
