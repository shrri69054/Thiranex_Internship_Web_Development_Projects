<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyCast — Real-Time Weather Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="site-header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">SkyCast</span>
      </div>
      <div class="header-meta">
        <span id="current-datetime" class="datetime-badge"></span>
      </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
      <div class="search-eyebrow">Live Weather Intelligence</div>
      <h1 class="search-headline">What's the sky doing<br /><em>right now?</em></h1>
      <form class="search-form" id="search-form" autocomplete="off">
        <div class="search-input-wrap">
          <span class="search-icon">⌕</span>
          <input
            type="text"
            id="city-input"
            class="search-input"
            placeholder="Enter city name…"
            aria-label="City name"
            spellcheck="false"
          />
          <button type="submit" class="search-btn" id="search-btn">
            <span class="btn-label">Search</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </div>
        <div class="quick-cities">
          <span class="quick-label">Try:</span>
          <button type="button" class="quick-pill" data-city="London">London</button>
          <button type="button" class="quick-pill" data-city="Tokyo">Tokyo</button>
          <button type="button" class="quick-pill" data-city="New York">New York</button>
          <button type="button" class="quick-pill" data-city="Mumbai">Mumbai</button>
          <button type="button" class="quick-pill" data-city="Sydney">Sydney</button>
        </div>
      </form>
    </section>

    <!-- Error Banner -->
    <div class="error-banner" id="error-banner" role="alert" aria-live="polite" hidden>
      <span class="error-icon">⚠</span>
      <span class="error-message" id="error-message"></span>
      <button class="error-dismiss" id="error-dismiss" aria-label="Dismiss error">✕</button>
    </div>

    <!-- Dashboard Grid -->
    <main class="dashboard" id="dashboard" hidden>

      <!-- Hero Card: City + Temp -->
      <div class="card card--hero" id="card-hero">
        <div class="hero-left">
          <div class="city-label">
            <span class="city-name" id="city-name">—</span>
            <span class="country-badge" id="country-badge"></span>
          </div>
          <div class="weather-condition" id="weather-condition">—</div>
          <div class="feels-like">Feels like <span id="feels-like">—</span></div>
          <div class="temp-range">
            <span class="range-tag">↑</span><span id="temp-max">—</span>
            <span class="range-tag">↓</span><span id="temp-min">—</span>
          </div>
        </div>
        <div class="hero-right">
          <div class="temperature-display" id="temperature">—</div>
          <div class="weather-emoji" id="weather-emoji">🌤</div>
          <button class="unit-toggle" id="unit-toggle" aria-label="Toggle temperature unit">
            <span class="unit-opt active" id="unit-c">°C</span>
            <span class="unit-sep">/</span>
            <span class="unit-opt" id="unit-f">°F</span>
          </button>
        </div>
      </div>

      <!-- Stat Cards Row -->
      <div class="stats-row">
        <div class="card card--stat" id="card-humidity">
          <div class="stat-icon">💧</div>
          <div class="stat-value" id="humidity">—</div>
          <div class="stat-label">Humidity</div>
          <div class="stat-bar-wrap">
            <div class="stat-bar" id="humidity-bar" style="width:0%"></div>
          </div>
        </div>
        <div class="card card--stat" id="card-wind">
          <div class="stat-icon">🌬</div>
          <div class="stat-value" id="wind-speed">—</div>
          <div class="stat-label">Wind Speed</div>
          <div class="wind-direction" id="wind-direction">—</div>
        </div>
        <div class="card card--stat" id="card-pressure">
          <div class="stat-icon">🔵</div>
          <div class="stat-value" id="pressure">—</div>
          <div class="stat-label">Pressure</div>
        </div>
        <div class="card card--stat" id="card-visibility">
          <div class="stat-icon">👁</div>
          <div class="stat-value" id="visibility">—</div>
          <div class="stat-label">Visibility</div>
        </div>
      </div>

      <!-- Sun Row -->
      <div class="sun-row">
        <div class="card card--sun">
          <div class="sun-block">
            <div class="sun-icon">🌅</div>
            <div class="sun-time" id="sunrise">—</div>
            <div class="sun-label">Sunrise</div>
          </div>
          <div class="sun-arc">
            <svg viewBox="0 0 200 80" class="arc-svg" id="sun-arc-svg" aria-hidden="true">
              <path d="M10,70 Q100,0 190,70" fill="none" stroke="var(--arc-track)" stroke-width="2" stroke-dasharray="4,4"/>
              <circle class="arc-sun" id="arc-sun" cx="10" cy="70" r="7"/>
            </svg>
          </div>
          <div class="sun-block">
            <div class="sun-icon">🌇</div>
            <div class="sun-time" id="sunset">—</div>
            <div class="sun-label">Sunset</div>
          </div>
        </div>
        <div class="card card--cloudcover">
          <div class="stat-icon">☁️</div>
          <div class="stat-value" id="cloudiness">—</div>
          <div class="stat-label">Cloud Cover</div>
          <div class="cloud-ring-wrap">
            <svg viewBox="0 0 80 80" class="cloud-ring" aria-hidden="true">
              <circle cx="40" cy="40" r="30" fill="none" stroke="var(--ring-track)" stroke-width="6"/>
              <circle cx="40" cy="40" r="30" fill="none" stroke="var(--accent)" stroke-width="6"
                stroke-dasharray="188.5" stroke-dashoffset="188.5"
                id="cloud-ring-circle" stroke-linecap="round"
                transform="rotate(-90 40 40)"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Footer Meta -->
      <div class="data-footer">
        <span>Data via <strong>OpenWeatherMap</strong></span>
        <span class="dot-sep">·</span>
        <span>Updated <span id="data-updated">—</span></span>
        <span class="dot-sep">·</span>
        <span>Coords: <span id="coords">—</span></span>
      </div>

    </main>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state">
      <div class="empty-art">
        <div class="empty-circle c1"></div>
        <div class="empty-circle c2"></div>
        <div class="empty-circle c3"></div>
        <span class="empty-emoji">🌍</span>
      </div>
      <p class="empty-text">Search any city to see live weather data</p>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
